# =============================================================================
# patterns.yaml — APP RUNTIME CONFIG
# =============================================================================
#
# Loaded at application startup by both greenlight and the Shopify Remix
# app. Defines every available color pattern with its 2-3 letter SKU code,
# display name, fabric_type (filters which series can use it), and a
# generic description.
#
# Editing this file changes how cables are *displayed and identified* in
# the live system. A typo or removed pattern code can break the resolver's
# pattern_for_code lookup, leaving cables registered against that code
# with pattern_name=null in displays. Adding a new pattern code does NOT
# automatically seed a sku_group row in the DB — that requires a small
# follow-up migration.
#
# Edit with care. Run `npm test` (shopify_app/) and the greenlight test
# suite after changes.
# =============================================================================

patterns:
  # ========================================
  # RAYON PATTERNS
  # ========================================

  - code: GL
    name: Goldline
    fabric_type: rayon
    description: Black rayon braid with gold tracer

  - code: SL
    name: Silverline
    fabric_type: rayon
    description: Black rayon braid with silver tracer

  - code: PW
    name: Pearl White
    fabric_type: rayon
    description: Solid white rayon braid

  # ========================================
  # COTTON PATTERNS
  # ========================================

  - code: RS
    name: Road Stripe
    fabric_type: cotton
    description: Black cotton braid with red tracer

  - code: BU
    name: Bungalow
    fabric_type: cotton
    description: Cotton bungalow braid

  - code: HP
    name: Houndstooth Putty
    fabric_type: cotton
    description: Putty cotton braid with black houndstooth tracer

  - code: EH
    name: Electric Houndstooth
    fabric_type: cotton
    description: Neon green cotton braid with neon purple houndstooth pattern
