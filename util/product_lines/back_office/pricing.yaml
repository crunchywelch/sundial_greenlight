# =============================================================================
# pricing.yaml — BACK OFFICE ONLY
# =============================================================================
#
# This file is NOT read by greenlight or the Shopify Remix app at runtime.
# It is consumed only by util/audio scripts that sync prices and costs
# to Shopify (audio_shopify_price_sync.py).
#
# Editing this file does NOT change anything in the running system until
# the sync script is run. Shopify is the canonical price store once data
# has been pushed to it.
#
# Cost keys with an 'R' suffix (e.g., '1R', '3R') are right-angle variants
# of that length; bare numeric keys are straight. Pricing keys are length
# only — straight and right-angle currently sell for the same price within
# a series.
# =============================================================================

