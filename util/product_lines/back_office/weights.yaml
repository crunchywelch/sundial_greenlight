# =============================================================================
# weights.yaml — BACK OFFICE ONLY
# =============================================================================
#
# Per-length finished-product weights (in ounces) for catalog cables. NOT
# read by greenlight or the Shopify Remix app at runtime. Consumed only by
# util/audio scripts that sync weights to Shopify product variants.
#
# For MISC variants (Special Baby) the weight is computed at product-create
# time from `materials.yaml` (cable_per_foot + connector weights). That
# calculation lives in greenlight/shopify_client.py and reads materials.yaml
# directly — see materials.yaml's header for context.
# =============================================================================

