# =============================================================================
# materials.yaml — APP RUNTIME (narrow path)
# =============================================================================
#
# Loaded by greenlight/shopify_client.py specifically when creating a
# Shopify product for a MISC ("Special Baby") variant — the weight of a
# new MISC product is computed from this file at create time, since
# back_office/economics.yaml only covers catalog (predefined) lengths.
#
# Editing changes the computed weight passed to Shopify for newly-created
# MISC products. Existing products are unaffected (their weight is already
# stored in Shopify). Numbers in ounces.
#
# Weight formula: cable_per_foot * length_ft + connector_a + connector_b
#
# Core cables are the inner wire before braiding/termination. Connector
# weights include the connector body, solder, and heat shrink.
# =============================================================================

cable_per_foot:
  GS-6: 0.6      # Canare GS-6 (instrument)
  L-4E6S: 0.6    # Canare L-4E6S (microphone/star-quad)

connectors:
  TS_straight: 0.8    # Neutrik NP2X or equivalent
  TS_right_angle: 1.2 # Neutrik NP2RX or equivalent
  XLR: 1.0            # Neutrik NC3MXX / NC3FXX average
