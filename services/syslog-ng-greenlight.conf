# Greenlight centralized logging
# Pi test boxes reach this via SSH tunnel to localhost:1514
# Local DO jobs (nightly valuation, etc.) send directly to localhost:1514
#
# All clients send newline-delimited RFC 3164 messages with the
# hostname baked into the tag: "greenlight@<hostname>"
# This avoids RFC 5424 complexity while still splitting by host.

source s_greenlight {
    tcp(
        ip("127.0.0.1")
        port(1514)
        keep-alive(yes)
    );
};

# Extract hostname from tag format "greenlight@<host>"
# Falls back to $HOST if tag doesn't contain @
rewrite r_extract_host {
    set("${PROGRAM}" value("HOST")
        condition(match("@" value("PROGRAM")))
    );
    subst(".*@", "" value("HOST")
        condition(match("@" value("HOST")))
    );
    subst("@.*", "" value("PROGRAM")
        condition(match("@" value("PROGRAM")))
    );
};

destination d_greenlight {
    file(
        "/var/log/greenlight/${HOST}.log"
        create-dirs(yes)
        owner("root")
        group("adm")
        perm(0640)
        dir-perm(0750)
        template("${ISODATE} ${HOST} ${PROGRAM}[${PID}]: ${MSG}\n")
    );
};

log {
    source(s_greenlight);
    rewrite(r_extract_host);
    destination(d_greenlight);
};
